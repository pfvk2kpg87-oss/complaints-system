<script>
// ==== إعداد الربط بجدول Google Sheets ====
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbykvKNo7ykLkE_zim2PgSobIY8SmoQu4jB0WDVLDppFCpv6zIRThTxKFXG0GOZyiQ3W/exec";

document.getElementById('refNum').textContent = 'سيُصدَر عند الإرسال';

function submitComplaint() {
  const submitBtn = document.querySelector('.submit-btn');
  if (submitBtn.disabled) return; // منع الضغط المزدوج

  const name       = document.getElementById('name').value;
  const contact    = document.getElementById('contact').value;
  const category   = document.getElementById('category').value;
  const location   = document.getElementById('location').value;
  const incDate    = document.getElementById('incidentDate').value;
  const desc       = document.getElementById('description').value;
  const suggestion = document.getElementById('suggestion').value;

  if (!category || !desc) {
    alert('يرجى تعبئة موضوع الشكوى والوصف التفصيلي على الأقل\nPlease fill in the complaint category and description.');
    return;
  }

  const disTypes = [...document.querySelectorAll('input[name="dis"]:checked')].map(i=>i.value).join(', ') || 'لم يُحدد';
  const role     = (document.querySelector('input[name="role"]:checked') || {value:'لم يُحدد'}).value;
  const severity = (document.querySelector('input[name="severity"]:checked') || {value:'لم يُحدد'}).value;
  const anon     = (document.querySelector('input[name="anon"]:checked') || {value:'لم يُحدد'}).value;
  const replyM   = (document.querySelector('input[name="replyMethod"]:checked') || {value:'لم يُحدد'}).value;

  submitBtn.disabled = true;
  submitBtn.textContent = 'جارٍ الإرسال... — Sending...';

  // معرّف فريد لكل عملية إرسال — يحمي من أي تكرار حتى لو حصل ضغط مزدوج
  const submissionId = (crypto.randomUUID ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).slice(2)));

  const payload = {
    action: 'create',
    submissionId,
    category,
    submitter: anon === 'نعم' ? 'مجهول الهوية' : (name || 'غير محدد'),
    contact: contact || '',
    role,
    disability: disTypes,
    incidentDate: incDate || '',
    location: location || '',
    description: desc,
    severity,
    suggestion: suggestion || '',
    anonymous: anon,
    replyMethod: replyM,
    source: 'نموذج التسجيل الإلكتروني',
  };

  const qs = new URLSearchParams(payload).toString();

  // انتقال مباشر وكامل لرابط الخادم — نفس فتح رابط عادي بالضبط
  // (مضمون العمل 100% على كل الأجهزة، بلا أي اتصال خلفي قابل للحجب)
  window.location.href = WEBAPP_URL + '?' + qs;
}
</script>
